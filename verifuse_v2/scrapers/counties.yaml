# VeriFuse vNEXT — County Configuration
# ======================================
# Each county entry maps a county slug to its platform adapter and state.
#
# GovSoft counties: base_url and credentials are NEVER stored here.
# They live in govsoft_county_configs (DB-seeded). See run_migrations.py.
#
# Pattern A: GovSoft Standard (ASP.NET WebForms + Playwright)
# Pattern B: GovSoft + CAPTCHA (captcha_mode in govsoft_county_configs)
# Pattern C: Static file ingestion (Denver — PTG/Pioneer system)
# Pattern D: Custom MVC (Larimer — no __VIEWSTATE)
#
# Platform values:
#   govsoft       — ASP.NET WebForms Public Trustee (GovSoft.us SaaS)
#   govsoft_pdf   — GovSoft + PDF post-sale list supplement
#   denver_ptg    — Denver Pioneer Technology Group static files
#   larimer_mvc   — Larimer custom ASP.NET MVC (HTTP only, no Playwright)
#   county_page   — direct county website
#   manual        — manual CSV/PDF ingest

counties:

  # ── Pattern A: GovSoft Standard — no CAPTCHA ────────────────────────────
  jefferson:
    platform: govsoft
    state: CO
    notes: "Full doc repo. Overbid at Sale. Accept Terms gate. Case IDs: J2400300. OBCLAIMVOUCHERLIENHOLDER for surplus proofs."

  arapahoe:
    platform: govsoft
    state: CO
    notes: "Full doc repo. Overbid at Sale. Accept Terms gate. Case IDs: 0275-2024. Pagination present."

  adams:
    platform: govsoft
    state: CO
    notes: "NO document repository. Use HTML Sale Information tab only. Overbid visible. No CAPTCHA. No Accept Terms."

  el_paso:
    platform: govsoft
    state: CO
    notes: "49K+ records — use strict 30-day Sold Date Range filters. Full doc repo. Overbid at Sale. No CAPTCHA."

  boulder:
    platform: govsoft
    state: CO
    notes: "Overbid field labeled 'Overbid Amount' (not 'Overbid at Sale'). contains(Overbid) regex required. Publishes UNCLAIMED OVERBID FUNDS.pdf and SALE INVOICE.pdf."

  broomfield:
    platform: govsoft
    state: CO
    notes: "No Accept Terms gate. No CAPTCHA. Standard GovSoft layout."

  gilpin:
    platform: govsoft
    state: CO
    notes: "Clean GovSoft deployment. No CAPTCHA. Full document repository."

