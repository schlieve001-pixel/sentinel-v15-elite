# VeriFuse — admin.verifuse.tech nginx config snippet
# Deploy: include this file in your main nginx.conf or /etc/nginx/sites-enabled/
# The admin subdomain proxies to the same FastAPI backend on port 8000.
# The Host header is forwarded so the API can detect admin subdomain via request.headers["host"].

server {
    listen 443 ssl http2;
    server_name admin.verifuse.tech;

    # SSL — uses same cert as verifuse.tech (wildcard or multi-SAN)
    ssl_certificate     /etc/letsencrypt/live/verifuse.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/verifuse.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # Admin API — forward to FastAPI on port 8000
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Serve same frontend for admin subdomain (React handles /admin route)
    location / {
        root   /home/schlieve001/origin/continuity_lab/verifuse/site/app/dist;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name admin.verifuse.tech;
    return 301 https://$host$request_uri;
}
